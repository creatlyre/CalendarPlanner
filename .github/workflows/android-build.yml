# Build Android APK (Capacitor native shell)
#
# Uses Capacitor to sync web assets, then Gradle to build the signed APK.
#
# Required GitHub Secrets:
#   KEYSTORE_BASE64    — base64-encoded android/dobryplan-keystore.jks
#   KEYSTORE_PASSWORD  — keystore password
#   KEY_PASSWORD       — signing key password

name: Build Android APK

on:
  push:
    branches: [master]
    paths:
      - 'android/**'
      - 'www/**'
      - 'capacitor.config.ts'
      - 'public/manifest.json'
      - 'public/sw.js'
      - 'public/icons/**'
      - 'pyproject.toml'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/dobryplan-keystore.jks

      - name: Extract version from pyproject.toml
        run: |
          APP_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          VERSION_CODE=$(echo "$APP_VERSION" | awk -F. '{printf "%d%02d%02d", $1, $2, $3}')
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Sync Capacitor web assets
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease -PappVersionName="$APP_VERSION" -PappVersionCode="$VERSION_CODE"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dobryplan-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ env.APP_VERSION }}
          name: Dobry Plan Android v${{ env.APP_VERSION }}
          body: |
            Android APK build from commit ${{ github.sha }}
            Version: ${{ env.APP_VERSION }} (code: ${{ env.VERSION_CODE }})
          files: android/app/build/outputs/apk/release/app-release.apk
