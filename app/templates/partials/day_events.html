<div class="rounded bg-white p-4 shadow">
    <div class="mb-3 flex items-center justify-between">
        <h3 class="text-lg font-semibold">Upcoming Events</h3>
        <span class="rounded bg-gray-100 px-2 py-1 text-xs text-gray-600">{{ date_label }}</span>
    </div>
    {% if events %}
    <ul class="space-y-2">
        {% for event in events %}
        <li class="rounded border border-gray-200 p-2">
            <div class="flex items-center justify-between">
                <div>
                    <div class="font-medium">{{ event.title }}</div>
                    <div class="text-xs text-gray-600">{{ event.start_at.strftime('%H:%M') }} - {{ event.end_at.strftime('%H:%M') }}</div>
                </div>
                <div class="flex gap-2">
                    <button class="rounded border border-blue-300 px-2 py-1 text-xs text-blue-700" onclick="prefillEvent('{{ event.id }}', '{{ event.title|e }}', '{{ (event.description or '')|e }}', '{{ event.start_at.strftime('%Y-%m-%dT%H:%M') }}', '{{ event.end_at.strftime('%Y-%m-%dT%H:%M') }}')">Edit</button>
                    <button class="rounded border border-red-300 px-2 py-1 text-xs text-red-700" onclick="deleteEvent('{{ event.id }}')">Delete</button>
                </div>
            </div>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p class="text-sm text-gray-600">No events for this day.</p>
    {% endif %}
</div>
