<form id="event-form" class="space-y-3" onsubmit="return submitEventForm(event)">
    <input id="event-id" type="hidden" />
    <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-gray-600">Title</label>
        <input id="event-title" required class="w-full rounded border border-gray-300 px-3 py-2 text-sm" />
    </div>
    <div>
        <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-gray-600">Description</label>
        <textarea id="event-description" class="w-full rounded border border-gray-300 px-3 py-2 text-sm" rows="2"></textarea>
    </div>
    <div class="grid grid-cols-2 gap-2">
        <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-gray-600">Start</label>
            <input id="event-start" type="datetime-local" required class="w-full rounded border border-gray-300 px-3 py-2 text-sm" />
        </div>
        <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-gray-600">End</label>
            <input id="event-end" type="datetime-local" required class="w-full rounded border border-gray-300 px-3 py-2 text-sm" />
        </div>
    </div>
    <div class="flex gap-2">
        <button type="submit" class="rounded bg-blue-600 px-3 py-2 text-sm text-white hover:bg-blue-700">Save Event</button>
        <button type="button" class="rounded border border-gray-300 px-3 py-2 text-sm" onclick="resetEventForm()">Reset</button>
    </div>
</form>
