<div class="rounded bg-white p-4 shadow">
    <div class="mb-3 flex items-center justify-between">
        <button class="rounded border border-gray-300 px-2 py-1 text-sm" hx-get="/calendar/month?year={{ prev_year }}&month={{ prev_month }}" hx-target="#month-grid" hx-swap="innerHTML" onclick="setMonthState({{ prev_year }}, {{ prev_month }})">Prev</button>
        <h3 class="text-lg font-semibold">{{ display_month_name }} {{ display_year }}</h3>
        <button class="rounded border border-gray-300 px-2 py-1 text-sm" hx-get="/calendar/month?year={{ next_year }}&month={{ next_month }}" hx-target="#month-grid" hx-swap="innerHTML" onclick="setMonthState({{ next_year }}, {{ next_month }})">Next</button>
    </div>
    <div class="grid grid-cols-7 gap-1 text-xs font-semibold uppercase text-gray-600">
        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
    </div>
    <div class="mt-2 grid grid-cols-7 gap-1 text-xs">
        {% for week in weeks %}
            {% for day in week %}
            {% set key = day.isoformat() %}
            {% set items = event_map.get(key, []) %}
            <button class="min-h-[84px] rounded border p-1 text-left {{ 'bg-blue-50 border-blue-300' if day == today else 'bg-white border-gray-200' }}" onclick="loadDay({{ day.year }}, {{ day.month }}, {{ day.day }})">
                <div class="font-semibold">{{ day.day }}</div>
                {% for event in items[:2] %}
                <div class="truncate text-[10px] text-gray-700">{{ event.start_at.strftime('%H:%M') }} {{ event.title }}</div>
                {% endfor %}
            </button>
            {% endfor %}
        {% endfor %}
    </div>
</div>
